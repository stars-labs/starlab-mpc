name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust tests + real-DKG e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      # native-node is intentionally excluded here — it needs Iced/graphics
      # system libraries that aren't worth provisioning for CI. The headless
      # stack (cli, tui-node, signal-server) covers the real DKG/signing path.
      - name: Unit tests
        run: cargo test -p frost-mpc-cli -p webrtc-signal-server --locked
             && cargo test -p tui-node --lib --locked

      # The end-to-end tests are #[ignore] by default (real WebRTC over
      # loopback). They need full UDP / link-local connectivity for ICE, which
      # GitHub's shared runners do NOT provide (observed: `could not listen udp
      # fe80::… os error 22`, then ICE never completes). So these four steps
      # RUN but do not gate the job (`continue-on-error`) — the hard gate is the
      # Unit-tests step above (no WebRTC). To gate on these, run them on a
      # self-hosted runner with real networking (see
      # docs/cli-conformance-testing.md §9). They pass locally in ~80s.
      - name: End-to-end DKG + threshold signing (real FROST/WebRTC)
        continue-on-error: true
        run: cargo test -p frost-mpc-cli --test e2e_dkg --locked -- --ignored --test-threads=1
        timeout-minutes: 12

      # L1 conformance matrix (docs/cli-conformance-testing.md): the full
      # (n,t) DKG + quorum-signing table, reporting every shape that breaks.
      - name: L1 conformance matrix (DKG/sign over all shapes)
        continue-on-error: true
        run: cargo test -p frost-mpc-cli --test conformance_matrix --locked -- --ignored --test-threads=1
        timeout-minutes: 12

      # L3 process isolation across two real `serve` binaries: DKG, malformed-
      # input survival, and LIFE-2 cold-start signing after a real restart.
      - name: L3 serve-process interop (DKG + signing + error handling)
        continue-on-error: true
        run: cargo test -p frost-mpc-cli --test l3_serve_process --locked -- --ignored --test-threads=1
        timeout-minutes: 12

      # L2 wire-frame golden: captures the real signal-server protocol via a
      # recording proxy and pins its normalized shape (the contract the
      # extension must match).
      - name: L2 wire-protocol golden (recording proxy; DKG + signing)
        continue-on-error: true
        run: cargo test -p frost-mpc-cli --test wire_trace --locked -- --ignored --test-threads=1
        timeout-minutes: 10

  extension:
    name: Browser extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The extension tests load the REAL core-wasm glue (not a mock) and import
      # @frost-mpc/types subpaths (e.g. .../dkg) that resolve to the types
      # package's `dist/` — neither is committed, so both must be built here.
      - name: Install Rust toolchain (wasm32 for wasm-pack)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      # Install the wasm-pack BINARY onto PATH. We can't rely on the npm
      # wasm-pack package because the next step installs with --ignore-scripts
      # (so its binary-download postinstall wouldn't run).
      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.13.1'
      - uses: oven-sh/setup-bun@v2

      # `--ignore-scripts`: the extension's postinstall (`wxt prepare`) imports
      # @frost-mpc/types/* and would fail before `dist/` exists. Skip lifecycle
      # scripts at install, build the deps, then prepare explicitly.
      - run: bun install --frozen-lockfile --ignore-scripts

      # Invoke wasm-pack from PATH (the jetli-installed binary), NOT `bun run
      # build:wasm` — the npm shim's binary wasn't downloaded under --ignore-scripts.
      - name: Build core-wasm (tests load the real WASM glue)
        run: cd packages/@frost-mpc/core-wasm && wasm-pack build --target web --out-dir pkg

      - name: Build shared types (provides @frost-mpc/types/* dist subpaths)
        run: bun run --filter '@frost-mpc/types' build

      - name: Prepare WXT (now that types dist exists)
        run: cd apps/browser-extension && bunx wxt prepare

      - run: cd apps/browser-extension && bun test

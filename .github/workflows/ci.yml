name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust tests + real-DKG e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: System deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      # native-node is intentionally excluded here — it needs Slint/graphics
      # system libraries that aren't worth provisioning for CI. The headless
      # stack (cli, tui-node, signal-server) covers the real DKG/signing path.
      - name: Unit tests
        run: cargo test -p mpc-wallet-cli -p webrtc-signal-server --locked
             && cargo test -p tui-node --lib --locked

      # The end-to-end tests are #[ignore] by default (real WebRTC over
      # loopback). Run them explicitly, single-threaded so the multiple
      # in-process nodes + embedded signal server don't contend.
      - name: End-to-end DKG + threshold signing (real FROST/WebRTC)
        run: cargo test -p mpc-wallet-cli --test e2e_dkg --locked -- --ignored --test-threads=1
        timeout-minutes: 12

      # L1 conformance matrix (docs/cli-conformance-testing.md): the full
      # (n,t) DKG + quorum-signing table, reporting every shape that breaks.
      - name: L1 conformance matrix (DKG/sign over all shapes)
        run: cargo test -p mpc-wallet-cli --test conformance_matrix --locked -- --ignored --test-threads=1
        timeout-minutes: 12

      # L3 process isolation across two real `serve` binaries: DKG, malformed-
      # input survival, and LIFE-2 cold-start signing after a real restart.
      - name: L3 serve-process interop (DKG + signing + error handling)
        run: cargo test -p mpc-wallet-cli --test l3_serve_process --locked -- --ignored --test-threads=1
        timeout-minutes: 12

      # L2 wire-frame golden: captures the real signal-server protocol via a
      # recording proxy and pins its normalized shape (the contract the
      # extension must match).
      - name: L2 wire-protocol golden (recording proxy; DKG + signing)
        run: cargo test -p mpc-wallet-cli --test wire_trace --locked -- --ignored --test-threads=1
        timeout-minutes: 10

  extension:
    name: Browser extension tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: cd apps/browser-extension && bun test

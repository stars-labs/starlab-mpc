name = "webrtc-signal-server-cloudflare-worker"
main = "build/worker/shim.mjs"
compatibility_date = "2025-05-08"
account_id = "2764ae0fd9a5cb92c9ac67708620e54c"

# Keep the workers.dev subdomain enabled so we always have a fallback
# URL for debugging when a custom-domain route is misbehaving.
workers_dev = true

# Bind the Worker to the apex of the panda.qzz.io zone.
# `custom_domain = true` makes Cloudflare auto-manage the DNS record
# (an AAAA pointing at the Worker) and issue the edge certificate.
routes = [
  { pattern = "panda.qzz.io", custom_domain = true }
]

[build]
command = "worker-build --release"

[durable_objects]
bindings = [
  { name = "Devices", class_name = "Devices" }
]

[[migrations]]
tag = "v2"  # Incremental tag, different from previous deployments
renamed_classes = [{ from = "Peers", to = "Devices" }]
<!doctype html>
<html lang="en">
  <head>
    <script>
      // Apply the saved theme before the bundle loads to avoid a flash
      // of the wrong color scheme. Mirrors resolveDark() in src/lib/theme.ts:
      // "system" (default) follows the OS; "light"/"dark" are explicit.
      (function () {
        try {
          var mode = localStorage.getItem("starlab_mpc_theme") || "system";
          var dark =
            mode === "dark" ||
            (mode === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (dark) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPC Wallet</title>
    <meta name="manifest.type" content="browser_action" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

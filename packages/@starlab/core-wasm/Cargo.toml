[package]
name = "starlab-core-wasm"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "WebAssembly bindings for the Starlab FROST MPC engine — DKG and threshold signing (ed25519 + secp256k1) in the browser."
keywords = ["frost", "mpc", "wasm", "threshold", "webassembly"]
categories = ["cryptography", "wasm"]

[lib]
crate-type = ["cdylib"]

[dependencies]
# WASM bindings — every #[wasm_bindgen] in lib.rs routes through this.
wasm-bindgen = "0.2.99"

# JSON <-> FROST round1/round2/commitment/share serialization.
# (`serde` itself isn't a direct dep — serde_json re-exports the
# traits it needs, and lib.rs has no custom #[derive(Serialize)].)
serde_json = "1.0.143"

# Optional panic-hook wired via `default = ["console_error_panic_hook"]`;
# call site is `console_error_panic_hook::set_once()` inside the gated
# cfg at lib.rs:699.
console_error_panic_hook = { version = "0.1.7", optional = true }

# Inherit the workspace-level getrandom (version 0.4 + wasm_js feature)
# so wasm-pack builds correctly resolve the js-sys backend. See root
# Cargo.toml for the feature-name rationale.
getrandom.workspace = true
# FROST 2.2 transitively pulls getrandom 0.2 via rand_core 0.6. Cargo
# treats this as a separate crate version from the 0.4 above, so the
# feature set has to be propagated per-version. We declare an explicit
# 0.2 entry with the `js` feature (renamed to `wasm_js` in 0.4) so the
# wasm backend is active on both. No code here imports it directly;
# this entry exists purely for feature-unification. Renamed via
# `package =` so it doesn't collide with the main `getrandom` name.
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }

# Hex encode/decode for FROST round1/round2 package wire format.
hex = "0.4.3"

# Use our shared starlab-core library
starlab-core = { path = "../core", version = "0.1.0" }

# Still need these for specific types
frost-secp256k1 = { version = "2.2.0", features = ["serde"] }
frost-ed25519 = { version = "2.2.0", features = ["serde"] }

# OsRng is the only RNG the code uses — pinned to the 0.6 line because
# that's what FROST 2.2's API exposes (see workspace Cargo.toml
# comment for the full explanation). The `getrandom` feature is what
# makes OsRng usable on wasm32.
rand_core = { version = "0.6", features = ["getrandom"] }

[features]
default = ["console_error_panic_hook"]


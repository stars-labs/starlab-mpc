[package]
name = "mpc-wallet-blockchain"
version = "0.1.0"
edition = "2024"
authors = ["MPC Wallet Team"]
description = "Blockchain support for MPC Wallet"
license = "MIT"

[dependencies]
# Error types via #[derive(thiserror::Error)] on BlockchainError.
thiserror = "2.0.9"

# Hex + base58 encoding used by ethereum.rs / solana.rs / bitcoin.rs for
# transaction-hash display + signature serialization.
hex = "0.4.3"

# serde_json::Value is the metadata type in ParsedTransaction /
# SignatureData. No direct `serde` use — `serde` is pulled in
# transitively via serde_json.
serde_json = "1.0.143"

# Solana SDK is imported as `use solana_sdk::bs58;` in solana.rs, but
# the bs58::decode/encode methods actually called (.into_vec,
# .into_string) come from the bs58 crate directly — solana_sdk's
# re-export is a leaner subset. Both deps therefore stay paired. No
# other solana-* crate is touched by this library's source; the
# ethers/web3/k256/spl-token/etc. layer was for the (disabled)
# examples at examples/{eth_dkg,solana_dkg}.rs.disabled.
solana-sdk = "4.0.1"
bs58 = "0.5.1"

# Hashing for transaction hashes:
#   sha2 (Sha256) — bitcoin.rs, solana.rs
#   sha3 (Keccak256) — ethereum.rs
sha2 = "0.11.0"
sha3 = "0.11.0"

[lib]
name = "mpc_wallet_blockchain"
path = "src/mod.rs"

[dev-dependencies]
# For the disabled reference examples at
# examples/{eth_dkg,solana_dkg}.rs.disabled. When/if those are
# reinstated they also need to refresh the bincode (2.0.x) + rlp /
# ethers-core / solana-sdk deps that were tangled into the API drift
# that caused them to be disabled — see examples/docs/MESH_SYNC_IMPROVEMENTS.md.
clap = { version = "4.5.21", features = ["derive"] }
